<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<tbody th:fragment="results">
<tr th:each="u : ${users}">
    <td th:text="${u.userId}"></td>
    <td th:text="${u.name}"></td>
    <td th:text="${u.username}"></td>
    <td th:text="${u.email}"></td>
    <td th:text="${u.role.roleId}"></td>
    <td th:text="${u.role.roleName}"></td>
    <td th:text="${u.membership}"></td>
    <td>
        <div class="d-flex gap-2">
            <a th:href="@{/admin/user/edit/{id}(id=${u.userId})}" class="btn btn-sm btn-primary">Edit</a>
            <a th:href="@{/admin/user/delete/{id}(id=${u.userId})}" class="btn btn-sm btn-danger">Delete</a>
        </div>
    </td>
</tr>
</tbody>
</body>
</html>
