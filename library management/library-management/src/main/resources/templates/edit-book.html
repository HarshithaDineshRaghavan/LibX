<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head}"></head>

<body>
<div class="container-scroller">
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <!-- partial -->
    <div class="container-fluid page-body-wrapper">
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>
        <!-- partial -->
        <div class="main-panel">
            <div class="content-wrapper">
                <div class="row">
                    <div class="col-md-12 grid-margin">
                        <div class="container mt-5">
<h3>Edit Book</h3>
<form th:action="@{'/admin/books/update/' + ${book.bookId}}" th:object="${book}" method="post">
  <div class="mb-3">
    <label>Book Name</label>
    <input type="text" th:field="*{bookName}" class="form-control">
  </div>
  <div class="mb-3">
    <label>Genre</label>
    <input type="text" th:field="*{genre}" class="form-control">
  </div>
  <div class="mb-3">
    <label>Total Copies</label>
    <input type="number" th:field="*{totalCopies}" class="form-control">
  </div>
  <div class="mb-3">
    <label>Available Copies</label>
      <input type="number"
             th:field="*{availableCopies}"
             class="form-control"
             min="0"
             oninput="this.value = Math.max(0, this.value)"
      />
  </div>
  <div class="form-group">
      <label>Author Name</label>
      <input type="text" th:field="*{authorName}" class="form-control" placeholder="Enter author name" required />
  </div>

    <button type="submit" class="btn btn-success">Save</button>
</form>
                        </div>
                    </div>
                </div>
            </div>
            <div th:replace="~{fragments/footer :: footer}"></div>
        </div>
    </div>
</div>
</body>

</html>

</html>
