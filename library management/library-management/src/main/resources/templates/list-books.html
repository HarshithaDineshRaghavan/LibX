<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head}"></head>
<style>
    .action-btn {
        min-width: 70px;
        text-align: center;
        margin-right: 6px; /* space between buttons */
        white-space: nowrap; /* prevents wrapping */
    }

    .action-group {
        display: flex;
        flex-wrap: nowrap;
        align-items: center;
    }
</style>
<body>
<div class="container-scroller">
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <!-- partial -->
    <div class="container-fluid page-body-wrapper">
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>
        <!-- partial -->
        <div class="main-panel">
            <div class="content-wrapper">
                <div class="row">
                    <div class="col-md-12 grid-margin">
                        <div class="container mt-5">
                            <h2>All Books</h2>
                            <table class="table table-bordered">
                                <thead>
                                <tr>
                                    <th>Book ID</th>
                                    <th>Book Name</th>
                                    <th>Genre</th>
                                    <th>Total Copies</th>
                                    <th>Available Copies</th>
                                    <th>Author ID</th>
                                    <th>Action</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="b : ${books}">
                                    <td th:text="${b.bookId}"></td>
                                    <td th:text="${b.bookName}"></td>
                                    <td th:text="${b.genre}"></td>
                                    <td th:text="${b.totalCopies}"></td>
                                    <td th:text="${b.availableCopies}"></td>
                                    <td th:text="${b.authorId}"></td>
                                    <td>
                                        <div class="action-group">
                                            <a th:href="@{/admin/books/edit/{id}(id=${b.bookId})}"
                                               class="btn btn-sm btn-primary action-btn">Edit</a>

                                            <a th:href="@{/admin/books/delete/{id}(id=${b.bookId})}"
                                               onclick="return confirm('Are you sure?')"
                                               class="btn btn-sm btn-danger action-btn">Delete</a>

                                            <a th:href="@{/admin/borrow/issue?bookId={id}(id=${b.bookId})}"
                                               class="btn btn-sm btn-success action-btn">Issue</a>
                                        </div>
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                            <a th:href="@{/home}" class="btn btn-secondary mt-3">Back</a>
                        </div>
                    </div>
                </div>
            </div>
            <div th:replace="~{fragments/footer :: footer}"></div>
        </div>
    </div>
</div>
</body>
</html>
