<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head}"></head>

<body>
    <div class="container-scroller">
        <div th:replace="~{fragments/navbar :: navbar}"></div>
        <div class="container-fluid page-body-wrapper">
            <div th:replace="~{fragments/sidebar :: sidebar}"></div>
            <div class="main-panel">
                <div class="content-wrapper">
                    <div class="row">
                        <div class="col-md-12 grid-margin">
                            <div class="container mt-5">
                                <h2>Edit User</h2>
                                <form th:action="@{'/admin/user/update/' + ${user.userId}}" th:object="${user}"
                                    method="post">
                                    <div class="mb-3">
                                        <label class="form-label">Name:</label>
                                        <input type="text" th:field="*{name}" th:placeholder="${user.name}"
                                            class="form-control" />
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label">Username:</label>
                                        <input type="text" th:field="*{userName}" th:placeholder="${user.userName}"
                                            class="form-control" />
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label">Password:</label>
                                        <input type="text" th:field="*{password}" th:placeholder="${user.password}"
                                            class="form-control" />
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Email</label>
                                        <input
                                                type="email"
                                                class="form-control"
                                                name="email"
                                                th:value="${user.email}"
                                                required
                                        />
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Role:</label>
                                        <select th:field="*{roleId}" class="form-control" required>
                                            <option value="">Select Role</option>
                                            <option th:each="r : ${roles}"
                                                    th:value="${r.roleId}"
                                                    th:text="${r.role + ' (id:' + r.roleId + ')'}"
                                                    th:selected="${user.roleId == r.roleId}">
                                            </option>
                                        </select>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Membership:</label>
                                        <select th:field="*{membership}" class="form-control" required>
                                            <option value="">Select Membership</option>
                                            <option value="yes">Yes</option>
                                            <option value="no">No</option>
                                        </select>
                                    </div>

                                    <button type="submit" class="btn btn-success">Save</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
                <div th:replace="~{fragments/footer :: footer}"></div>
            </div>
        </div>
    </div>
</body>

</html>
