<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head}"></head>

<body>
<div class="container-scroller">

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container-fluid page-body-wrapper">

        <div th:replace="~{fragments/sidebar :: sidebar}"></div>

        <div class="main-panel">
            <div class="content-wrapper">
                <div class="row mb-4">
                    <div class="col-md-12">
                        <h2 class="fw-bold">Welcome to LibX</h2>
                        <p class="text-muted">Here’s a quick overview</p>
                    </div>
                </div>
                <div class="row g-4">

                    <div class="col-md-3">
                        <div class="card p-3 shadow-sm">
                            <div class="d-flex justify-content-between">
                                <div>
                                    <h6 class="text-muted">Total Books</h6>
                                    <h2 th:text="${totalBooks}">0</h2>
                                </div>
                                <i class="mdi mdi-book-open-page-variant text-primary" style="font-size: 32px;"></i>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="card p-3 shadow-sm">
                            <div class="d-flex justify-content-between">
                                <div>
                                    <h6 class="text-muted">Total Users</h6>
                                    <h2 th:text="${totalUsers}">0</h2>
                                </div>
                                <i class="mdi mdi-account-group text-success" style="font-size: 32px;"></i>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="card p-3 shadow-sm">
                            <div class="d-flex justify-content-between">
                                <div>
                                    <h6 class="text-muted">Available Books</h6>
                                    <h2 th:text="${availableBooks}">0</h2>
                                </div>
                                <i class="mdi mdi-book-check text-info" style="font-size: 32px;"></i>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="card p-3 shadow-sm">
                            <div class="d-flex justify-content-between">
                                <div>
                                    <h6 class="text-muted">Issued Books</h6>
                                    <h2 th:text="${issuedBooks}">0</h2>
                                </div>
                                <i class="mdi mdi-book-minus text-danger" style="font-size: 32px;"></i>
                            </div>
                        </div>
                    </div>

                </div>

                <div class="row mt-5">
                    <div class="col-md-12">
                        <h4 class="mb-3 fw-semibold">Quick Actions</h4>

                        <a th:href="@{/admin/books/add}" class="btn btn-primary me-3">
                            Add Book
                        </a>

                        <a th:href="@{/admin/user/addUser}" class="btn btn-success me-3">
                            Add User
                        </a>
                    </div>
                </div>

                <div class="row mt-5">
                    <div class="col-md-12">
                        <div class="card shadow-sm">
                            <div class="card-body">

                                <h4 class="mb-3 fw-semibold">Recently Added Books</h4>

                                <div class="table-responsive">
                                    <table class="table table-hover">
                                        <thead class="table-light">
                                        <tr>
                                            <th>Book Name</th>
                                            <th>Genre</th>
                                            <th>Available</th>
                                            <th>Action</th>
                                        </tr>
                                        </thead>

                                        <tbody>
                                        <tr th:each="b : ${recentBooks}">
                                            <td th:text="${b.bookName}">Book Name</td>
                                            <td th:text="${b.genre}">Genre</td>
                                            <td th:text="${b.availableCopies}">0</td>
                                            <td>
                                                <a th:href="@{/admin/books/edit/{id}(id=${b.bookId})}"
                                                   class="btn btn-sm btn-primary">Edit</a>
                                                <a th:href="@{/admin/books/delete/{id}(id=${b.bookId})}"
                                                   onclick="return confirm('Delete this book?')"
                                                   class="btn btn-sm btn-danger">Delete</a>
                                            </td>
                                        </tr>

                                        <tr th:if="${#lists.isEmpty(recentBooks)}">
                                            <td colspan="4" class="text-muted text-center">
                                                No books added yet.
                                            </td>
                                        </tr>
                                        </tbody>

                                    </table>
                                </div>

                                <a th:href="@{/admin/books/list}" class="btn btn-outline-secondary mt-2">
                                    View All Books
                                </a>

                            </div>
                        </div>
                    </div>
                </div>

            </div>

            <div th:replace="~{fragments/footer :: footer}"></div>

        </div>
    </div>
</div>
</body>
</html>
