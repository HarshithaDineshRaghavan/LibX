<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head}"></head>

<body>
<div class="container-scroller">
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container-fluid page-body-wrapper">
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>

        <div class="main-panel">
            <div class="content-wrapper">

                <h2 class="mb-4">Borrow Records</h2>

                <table class="table table-bordered table-striped">
                    <thead>
                    <tr>
                        <th>Borrow ID</th>
                        <th>User</th>
                        <th>Book</th>
                        <th>Borrow Date</th>
                        <th>Due Date</th>
                        <th>Return Date</th>
                        <th>Status</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="r : ${records}"
                        th:classappend="${!r.isReturned and r.dueDate != null and r.dueDate.isBefore(T(java.time.LocalDate).now())}
                    ? 'table-danger'">


                    <td th:text="${r.borrowId}"></td>
                        <td th:text="${r.userName}"></td>
                        <td th:text="${r.bookName}"></td>
                        <td th:text="${r.borrowDate}"></td>
                        <td th:text="${r.dueDate}"></td>

                        <td th:text="${r.returnDate != null ? r.returnDate : '-'}"></td>

                        <td>
                            <span th:if="${r.isReturned}"
                                  class="badge bg-success">Returned</span>

                            <span th:if="${!r.isReturned}"
                                  class="badge bg-warning text-dark">Issued</span>
                        </td>
                    </tr>
                    </tbody>
                </table>


            </div>
            <div th:replace="~{fragments/footer :: footer}"></div>
        </div>

    </div>
</div>

</body>
</html>
